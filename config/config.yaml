paths:
  data_processed: data/processed
  models_baseline: models/baseline
  models_distilbert: models/distilbert
  results: results
  logs: logs

data:
  dataset_name: bitext/Bitext-customer-support-llm-chatbot-training-dataset
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
  min_examples_per_class: 50
  intent_categories:
    - billing_issue
    - account_access
    - technical_support
    - product_inquiry
    - cancellation_request
    - general_feedback

baseline:
  tfidf:
    max_features: 10000
    ngram_range: [1, 2]
    min_df: 2
    sublinear_tf: true
  logistic_regression:
    C: 1.0
    max_iter: 1000
    class_weight: balanced
    solver: lbfgs
    seed: 42

classifier:
  model_name: distilbert-base-uncased
  max_length: 128
  num_labels: 6
  epochs: 5
  batch_size: 16
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  eval_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: f1_weighted
  fp16: true
  early_stopping_patience: 2
  seed: 42
  cpu_train_sample: 3000   # subsample size when training on CPU
  cpu_max_steps: 300        # max training steps on CPU (~45 min)

generation:
  provider: anthropic  # anthropic | huggingface
  model: claude-haiku-4-5-20251001
  hf_model: mistralai/Mistral-7B-Instruct-v0.2
  max_tokens: 300
  temperature: 0.3
  top_p: 0.9
  low_confidence_threshold: 0.70

evaluation:
  ragas_sample_size: 50
  faithfulness_flag_threshold: 0.5
  target_faithfulness: 0.85
  target_answer_relevancy: 0.80
